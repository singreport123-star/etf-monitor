name: ETF 數據採集與補貨
on:
  workflow_dispatch:
    inputs:
      days:
        description: '要補抓的天數 (預設 1 天)'
        default: '1'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests yfinance
      
      - name: 執行採集 (支援批量)
        run: |
          # 取得要跑的天數，預設是 1
          DAYS=${{ github.event.inputs.days }}
          echo "準備補抓過去 $DAYS 天的資料..."
          
          # 寫一個迴圈，從 0 數到 DAYS-1
          for i in $(seq 0 $((DAYS-1))); do
            # 算出日期 (YYYY-MM-DD)
            export TARGET_DATE=$(date -d "$i days ago" +%Y-%m-%d)
            echo "--- 正在處理: $TARGET_DATE ---"
            python crawler.py
          done

      - name: 存檔回 GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Manual Feeding: Updated ETF Data" || exit 0
          git push
