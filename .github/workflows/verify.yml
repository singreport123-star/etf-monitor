name: 指定日期 ETF 採集

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: '欲抓取的日期 (YYYY-MM-DD)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 安裝套件
        run: pip install requests yfinance
        
      - name: 執行採集
        env:
          TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: python crawler.py
        
      - name: 更新日期清單
        run: |
          mkdir -p data
          # 掃描資料夾產出 list.json
          ls data/*.json | sed 's/data\///g' | sed 's/.json//g' | jq -R . | jq -s 'sort | reverse' > list.json
          
      - name: 自動提交存檔
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/*.json list.json
          git commit -m "Update: ${{ github.event.inputs.target_date }}" || exit 0
          git push
