name: ETF 數據採集與批量補貨
on:
  workflow_dispatch:
    inputs:
      days:
        description: '要補抓的天數'
        default: '1'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests yfinance
      
      - name: 執行批量採集
        run: |
          DAYS=${{ github.event.inputs.days }}
          echo "🚀 準備補抓過去 $DAYS 天的數據..."
          
          # 從 0 開始回溯到 DAYS-1
          for i in $(seq 0 $((DAYS-1))); do
            export TARGET_DATE=$(date -d "$i days ago" +%Y-%m-%d)
            echo "--- 📅 處理日期: $TARGET_DATE ---"
            python crawler.py
          done

      - name: 提交並存檔
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data/
          git commit -m "Manual Batch Feeding: $DAYS days" || exit 0
          git push
