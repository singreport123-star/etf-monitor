<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>ETF 持股市值監測 v16.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .date-input-box { background: #1e293b; color: white; border: 2px solid #3b82f6; padding: 12px; border-radius: 12px; cursor: pointer; font-size: 1.2rem; font-weight: 800; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); scale: 1.5; cursor: pointer; }
        th { cursor: pointer; user-select: none; position: relative; white-space: nowrap; font-size: 0.9rem; }
        tbody tr td { font-size: 1.2rem; padding: 1.8rem 1rem !important; }
        .font-impact { font-family: ui-monospace, monospace; font-weight: 900; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 p-4 md:p-10">
    <div class="max-w-[1700px] mx-auto">
        <h1 class="text-5xl font-black mb-10 text-blue-400 italic">ETF MARKET VALUE TRACKER</h1>

        <div id="errorDisplay" class="hidden bg-red-900/50 border border-red-500 text-red-200 p-6 rounded-2xl mb-8 text-xl font-bold animate-pulse"></div>

        <div class="bg-slate-800 p-10 rounded-[2.5rem] mb-10 border border-slate-700 shadow-2xl">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-10 items-end">
                <div class="md:col-span-3">
                    <label class="block text-xs text-slate-500 mb-4 font-bold uppercase">Select ETF</label>
                    <select id="etfId" class="bg-slate-900 p-5 rounded-2xl border border-slate-700 w-full font-black text-2xl outline-none focus:border-blue-500">
                        <option value="00981A">00981A (統一)</option>
                        <option value="00982A">00982A (群益)</option>
                    </select>
                </div>
                <div class="md:col-span-3">
                    <label class="block text-xs text-blue-400 mb-4 font-bold uppercase tracking-widest">📅 DATE A (舊)</label>
                    <input id="dateA" type="date" class="date-input-box">
                </div>
                <div class="md:col-span-1 text-center pb-6 text-slate-600 font-black italic text-4xl">VS</div>
                <div class="md:col-span-3">
                    <label class="block text-xs text-blue-400 mb-4 font-bold uppercase tracking-widest">📅 DATE B (新)</label>
                    <input id="dateB" type="date" class="date-input-box">
                </div>
                <div class="md:col-span-2">
                    <button id="runBtn" onclick="runAnalysis()" class="w-full bg-blue-600 hover:bg-blue-500 py-6 rounded-2xl font-black text-2xl shadow-lg transition active:scale-95">跑分析</button>
                </div>
            </div>
        </div>

        <div class="bg-slate-800 rounded-[3rem] overflow-hidden border border-slate-700 shadow-2xl">
            <table class="w-full text-left" id="mainTable">
                <thead class="bg-slate-700 text-slate-400 font-black uppercase">
                    <tr>
                        <th class="p-6">標的</th>
                        <th class="p-6">異動狀態</th>
                        <th class="p-6 text-right">A日股數</th>
                        <th class="p-6 text-right">A日股價</th>
                        <th class="p-6 text-right font-bold text-slate-300">A日市值</th>
                        <th class="p-6 text-right">B日股數</th>
                        <th class="p-6 text-right">B日股價</th>
                        <th class="p-6 text-right font-bold text-white">B日市值</th>
                        <th class="p-6 text-right bg-slate-600/40 text-blue-300 text-2xl">加減碼金額</th>
                    </tr>
                </thead>
                <tbody id="resTable" class="divide-y divide-slate-700/50"></tbody>
            </table>
        </div>
    </div>

    <script>
        let currentData = [];
        window.onload = () => {
            const now = new Date(), today = now.toISOString().split('T')[0];
            document.getElementById('dateB').value = today;
            document.getElementById('dateA').value = new Date(now.setDate(now.getDate() - 1)).toISOString().split('T')[0];
        };

        function showError(msg) {
            const el = document.getElementById('errorDisplay');
            el.innerText = msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 8000);
        }

        async function triggerAction(date) {
            const owner = localStorage.getItem('ghOwner'), token = localStorage.getItem('ghToken');
            await fetch(`https://api.github.com/repos/${owner}/etf-monitor/actions/workflows/verify.yml/dispatches`, {
                method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' },
                body: JSON.stringify({ ref: 'main', inputs: { target_date: date } })
            });
        }

        async function runAnalysis() {
            const etf = document.getElementById('etfId').value, dA = document.getElementById('dateA').value, dB = document.getElementById('dateB').value;
            const btn = document.getElementById('runBtn');
            btn.innerText = "⏳ 讀取中...";
            
            try {
                const [rA, rB] = await Promise.all([fetch(`data/${dA}.json`), fetch(`data/${dB}.json`)]);
                
                if(!rA.ok || !rB.ok) {
                    showError(`檔案缺失！正在叫機器人去補抓 ${!rA.ok ? dA : ''} ${!rB.ok ? dB : ''} 的資料...`);
                    if(!rA.ok) await triggerAction(dA);
                    if(!rB.ok) await triggerAction(dB);
                    btn.innerText = "跑分析";
                    return;
                }

                const jsonA = await rA.json(), jsonB = await rB.json();
                
                // --- 診斷邏輯：檢查 00982A 是否真的存在於 JSON 裡 ---
                if (!jsonA.etfs[etf] || jsonA.etfs[etf].length === 0) {
                    btn.innerText = "跑分析";
                    return showError(`❌ 錯誤：${dA} 的資料包裡找不到 ${etf} 的持股名單！建議刪除該日檔案重抓。`);
                }
                if (!jsonB.etfs[etf] || jsonB.etfs[etf].length === 0) {
                    btn.innerText = "跑分析";
                    return showError(`❌ 錯誤：${dB} 的資料包裡找不到 ${etf} 的持股名單！建議刪除該日檔案重抓。`);
                }

                const mapA = Object.fromEntries(jsonA.etfs[etf].map(s => [s.id, s]));
                const mapB = Object.fromEntries(jsonB.etfs[etf].map(s => [s.id, s]));
                const pA_pool = jsonA.market_prices || {}, pB_pool = jsonB.market_prices || {};
                
                currentData = Array.from(new Set([...Object.keys(mapA), ...Object.keys(mapB)])).map(id => {
                    const sA = mapA[id] || { share: 0, name: mapB[id]?.name };
                    const sB = mapB[id] || { share: 0, name: mapA[id]?.name };
                    const pA = Number(pA_pool[id]) || 0, pB = Number(pB_pool[id]) || 0;
                    const valA = sA.share * pA, valB = sB.share * pB, impact = valB - valA;
                    
                    let status = "持平", color = "text-slate-500";
                    if(sA.share === 0) { status = "新進"; color = "text-yellow-400"; }
                    else if(sB.share === 0) { status = "出清"; color = "text-red-500"; }
                    else if(sB.share > sA.share) { status = "加碼"; color = "text-red-400"; }
                    else if(sB.share < sA.share) { status = "減碼"; color = "text-emerald-400"; }
                    return { id, name: sB.name || sA.name || '未知', status, shareA: sA.share, pA, valA, shareB: sB.share, pB, valB, impact, color };
                });

                currentData.sort((a, b) => Math.abs(b.impact) - Math.abs(a.impact));
                
                document.getElementById('resTable').innerHTML = currentData.map(row => `
                    <tr class="hover:bg-slate-700/40 transition-all">
                        <td class="p-6"><b>${row.name}</b> <br><span class="text-xs font-mono text-slate-500">${row.id}</span></td>
                        <td class="p-6"><span class="px-5 py-2 border rounded-full font-black text-sm ${row.color}">${row.status}</span></td>
                        <td class="p-6 text-right text-slate-400">${row.shareA.toLocaleString()}</td>
                        <td class="p-6 text-right text-slate-500">${row.pA || '-'}</td>
                        <td class="p-6 text-right text-slate-300 font-bold">${Math.round(row.valA).toLocaleString()}</td>
                        <td class="p-6 text-right text-slate-100 font-bold">${row.shareB.toLocaleString()}</td>
                        <td class="p-6 text-right text-blue-300 font-black">${row.pB || '-'}</td>
                        <td class="p-6 text-right text-white font-black">${Math.round(row.valB).toLocaleString()}</td>
                        <td class="p-6 text-right font-impact text-2xl ${row.impact > 0 ? 'text-red-400' : (row.impact < 0 ? 'text-emerald-400' : 'text-slate-500')}">
                            ${row.impact > 0 ? '+' : ''}${Math.round(row.impact).toLocaleString()}</td>
                    </tr>`).join('');
                btn.innerText = "跑分析";
            } catch (e) {
                console.error(e);
                showError("JS 執行錯誤，請開啟 F12 檢查 Console。");
                btn.innerText = "跑分析";
            }
        }
    </script>
</body>
</html>
