<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF 加減碼動態監測站 v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        th { cursor: pointer; transition: background 0.2s; }
        th:hover { background-color: rgba(59, 130, 246, 0.2); }
        .sort-icon::after { content: ' ↕'; opacity: 0.3; font-size: 0.8em; }
        .sort-asc::after { content: ' ↑'; opacity: 1; color: #60a5fa; }
        .sort-desc::after { content: ' ↓'; opacity: 1; color: #60a5fa; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 p-4 md:p-8 font-sans">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-blue-400">📊 ETF 加減碼監測站 <span class="text-sm font-normal text-gray-500">v2.0</span></h1>
        </div>

        <div class="bg-gray-800 border border-blue-500/30 p-6 rounded-xl mb-8 shadow-2xl">
            <h2 class="text-lg font-bold mb-4 flex items-center text-blue-300">📅 雲端數據補件 (點選月曆)</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div class="col-span-1 md:col-span-2">
                    <label class="block text-xs text-gray-400 mb-1">GitHub 帳號 / Token</label>
                    <div class="flex gap-2">
                        <input id="ghOwner" type="text" placeholder="帳號" class="bg-gray-700 border-gray-600 rounded px-3 py-2 w-1/3 focus:ring-2 focus:ring-blue-500 outline-none">
                        <input id="ghToken" type="password" placeholder="ghp_Token" class="bg-gray-700 border-gray-600 rounded px-3 py-2 flex-1 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">選擇採集日期 (點擊開啟月曆)</label>
                    <input id="triggerDate" type="date" class="bg-gray-700 border-gray-600 rounded px-3 py-2 w-full text-white focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <button onclick="triggerAction()" class="bg-blue-600 hover:bg-blue-500 py-2 rounded font-bold shadow-lg transform active:scale-95 transition">🚀 啟動抓取</button>
            </div>
            <p id="statusTxt" class="mt-3 text-sm text-yellow-500 italic font-medium"></p>
        </div>

        <div class="bg-gray-800 p-6 rounded-xl shadow-2xl mb-8 border border-gray-700">
            <div class="flex flex-wrap gap-6 items-end">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">選擇 ETF</label>
                    <select id="etfId" class="bg-gray-700 border-gray-600 rounded px-4 py-2 outline-none focus:border-blue-500">
                        <option value="00981A">00981A (統一台股增長)</option>
                        <option value="00982A">00982A (群益精選強棒)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">日期 A (較舊)</label>
                    <select id="dateA" class="bg-gray-700 border-gray-600 rounded px-4 py-2 w-40 outline-none"></select>
                </div>
                <div class="text-gray-600 font-bold px-2 self-center">比對</div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">日期 B (較新)</label>
                    <select id="dateB" class="bg-gray-700 border-gray-600 rounded px-4 py-2 w-40 outline-none"></select>
                </div>
                <button onclick="compareData()" class="bg-green-600 hover:bg-green-500 px-10 py-2 rounded font-bold shadow-lg transform active:scale-95 transition">🔎 開始計算</button>
            </div>
        </div>

        <div class="bg-gray-800 rounded-xl overflow-hidden shadow-2xl border border-gray-700">
            <div class="p-4 bg-gray-700/30 text-xs text-gray-400 italic">💡 提示：點擊下方標題（如「異動股數」）可自動進行大小排序</div>
            <table class="w-full text-left border-collapse" id="mainTable">
                <thead class="bg-gray-700/50 text-gray-300 text-xs uppercase tracking-wider">
                    <tr>
                        <th class="p-4 sort-icon" onclick="sortRows('name')">標的名稱</th>
                        <th class="p-4 text-right sort-icon" onclick="sortRows('shareA')">A日股數</th>
                        <th class="p-4 text-right sort-icon" onclick="sortRows('shareB')">B日股數</th>
                        <th class="p-4 text-right sort-icon" onclick="sortRows('diff')">異動股數</th>
                        <th class="p-4 text-right sort-icon" onclick="sortRows('price')">B日股價</th>
                        <th class="p-4 text-right text-blue-400 sort-icon" onclick="sortRows('impact')">估計加減碼(NTD)</th>
                    </tr>
                </thead>
                <tbody id="resTable" class="divide-y divide-gray-700">
                    <tr><td colspan="6" class="p-10 text-center text-gray-500">請選取日期並開始計算</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let currentData = []; // 儲存當前比對結果用於排序
        let sortState = { key: '', asc: false };

        window.onload = () => {
            document.getElementById('ghOwner').value = localStorage.getItem('ghOwner') || '';
            document.getElementById('ghToken').value = localStorage.getItem('ghToken') || '';
            // 預設日期月曆為今天
            document.getElementById('triggerDate').valueAsDate = new Date();
            loadDateList();
        };

        async function loadDateList() {
            try {
                const res = await fetch('list.json?t=' + Date.now());
                const dates = await res.json();
                const selA = document.getElementById('dateA');
                const selB = document.getElementById('dateB');
                selA.innerHTML = ''; selB.innerHTML = '';
                dates.forEach(d => {
                    selA.add(new Option(d, d));
                    selB.add(new Option(d, d));
                });
                if(dates.length > 1) selA.selectedIndex = 1;
            } catch (e) { console.error("尚無資料"); }
        }

        async function triggerAction() {
            const owner = document.getElementById('ghOwner').value;
            const token = document.getElementById('ghToken').value;
            const date = document.getElementById('triggerDate').value;
            const txt = document.getElementById('statusTxt');

            if(!owner || !token || !date) return alert("資訊未填齊");
            localStorage.setItem('ghOwner', owner);
            localStorage.setItem('ghToken', token);

            txt.innerText = "⏳ 雲端指令已發送，請等待約 2-3 分鐘後重新整理頁面...";
            const res = await fetch(`https://api.github.com/repos/${owner}/etf-monitor/actions/workflows/verify.yml/dispatches`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' },
                body: JSON.stringify({ ref: 'main', inputs: { target_date: date } })
            });

            if(!res.ok) txt.innerText = "❌ 啟動失敗，請檢查 Token 權限。";
        }

        async function compareData() {
            const etf = document.getElementById('etfId').value;
            const dA = document.getElementById('dateA').value;
            const dB = document.getElementById('dateB').value;
            const tbody = document.getElementById('resTable');

            tbody.innerHTML = '<tr><td colspan="6" class="p-10 text-center">數據讀取中...</td></tr>';

            try {
                const [dataA, dataB] = await Promise.all([
                    fetch(`data/${dA}.json`).then(r => r.json()),
                    fetch(`data/${dB}.json`).then(r => r.json())
                ]);

                const mapA = Object.fromEntries(dataA.etfs[etf].map(s => [s.id, s]));
                const mapB = Object.fromEntries(dataB.etfs[etf].map(s => [s.id, s]));
                const pricesB = dataB.market_prices || {};
                const allIds = new Set([...Object.keys(mapA), ...Object.keys(mapB)]);

                currentData = [];
                Array.from(allIds).forEach(id => {
                    const sA = mapA[id] || { share: 0, name: mapB[id]?.name };
                    const sB = mapB[id] || { share: 0, name: mapA[id]?.name };
                    const diff = sB.share - sA.share;
                    const price = pricesB[id] || 0;
                    const impact = diff * price;

                    if(diff !== 0) {
                        currentData.push({
                            id,
                            name: sB.name || sA.name,
                            shareA: sA.share,
                            shareB: sB.share,
                            diff,
                            price,
                            impact
                        });
                    }
                });
                
                // 預設按加減碼金額由大到小排序
                sortRows('impact', true);
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-red-400">讀取失敗，請確認資料已入庫。</td></tr>';
            }
        }

        function sortRows(key, forceDesc = false) {
            if (sortState.key === key && !forceDesc) {
                sortState.asc = !sortState.asc;
            } else {
                sortState.key = key;
                sortState.asc = forceDesc ? false : false; // 預設點擊從大到小
            }

            currentData.sort((a, b) => {
                let valA = a[key], valB = b[key];
                if (typeof valA === 'string') return sortState.asc ? valA.localeCompare(valB) : valB.localeCompare(valA);
                return sortState.asc ? valA - valB : valB - valA;
            });

            renderTable();
            updateHeaders();
        }

        function updateHeaders() {
            const headers = document.querySelectorAll('th');
            const keys = ['name', 'shareA', 'shareB', 'diff', 'price', 'impact'];
            headers.forEach((th, idx) => {
                th.classList.remove('sort-asc', 'sort-desc');
                if (keys[idx] === sortState.key) {
                    th.classList.add(sortState.asc ? 'sort-asc' : 'sort-desc');
                }
            });
        }

        function renderTable() {
            const tbody = document.getElementById('resTable');
            let html = '';
            currentData.forEach(row => {
                html += `<tr class="hover:bg-gray-700/40 transition">
                    <td class="p-4"><span class="text-[10px] text-gray-500 font-mono">${row.id}</span><br>${row.name}</td>
                    <td class="p-4 text-right text-gray-400">${row.shareA.toLocaleString()}</td>
                    <td class="p-4 text-right text-gray-400">${row.shareB.toLocaleString()}</td>
                    <td class="p-4 text-right font-bold ${row.diff > 0 ? 'text-red-400' : 'text-green-400'}">
                        ${row.diff > 0 ? '+' : ''}${row.diff.toLocaleString()}
                    </td>
                    <td class="p-4 text-right text-gray-300 font-mono">${row.price}</td>
                    <td class="p-4 text-right font-mono font-bold ${row.impact > 0 ? 'text-red-400' : 'text-green-400'}">
                        ${Math.round(row.impact).toLocaleString()}
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html || '<tr><td colspan="6" class="p-10 text-center text-gray-500">無變動數據</td></tr>';
        }
    </script>
</body>
</html>
