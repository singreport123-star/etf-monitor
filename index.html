<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>ETF 市值變動監測 v18.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .date-input { background: #1e293b; color: white; border: 3px solid #3b82f6; padding: 14px; border-radius: 12px; cursor: pointer; font-size: 1.3rem; font-weight: 900; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); scale: 1.6; cursor: pointer; }
        th { white-space: nowrap; font-size: 0.9rem; padding: 1.5rem 1rem !important; cursor: pointer; letter-spacing: 1px; }
        /* 數據欄位字體極致放大 */
        tbody tr td { font-size: 1.3rem; padding: 2.2rem 1rem !important; }
        .font-num { font-family: ui-monospace, SFMono-Regular, monospace; font-weight: 800; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 p-8">
    <div class="max-w-[1900px] mx-auto">
        <h1 class="text-6xl font-black mb-12 text-blue-400 tracking-tighter italic">ETF MARKET ANALYZER</h1>

        <div class="bg-slate-800 p-12 rounded-[3rem] mb-12 border border-slate-700 shadow-2xl">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-10 items-end">
                <div class="md:col-span-3">
                    <label class="block text-sm text-slate-500 mb-4 font-bold uppercase tracking-widest">Target Portfolio</label>
                    <select id="etfId" class="bg-slate-900 p-5 rounded-2xl border-2 border-slate-700 w-full font-black text-2xl outline-none focus:border-blue-500">
                        <option value="00981A">00981A (統一強棒)</option>
                        <option value="00982A">00982A (群益強棒)</option>
                    </select>
                </div>
                <div class="md:col-span-3">
                    <label class="block text-sm text-blue-400 mb-4 font-bold">📅 起始 A (舊)</label>
                    <input id="dateA" type="date" class="date-input w-full">
                </div>
                <div class="md:col-span-1 text-center pb-6 text-slate-600 font-black italic text-5xl">VS</div>
                <div class="md:col-span-3">
                    <label class="block text-sm text-blue-400 mb-4 font-bold">📅 結束 B (新)</label>
                    <input id="dateB" type="date" class="date-input w-full">
                </div>
                <div class="md:col-span-2">
                    <button onclick="runAnalysis()" class="w-full bg-blue-600 hover:bg-blue-500 py-6 rounded-3xl font-black text-3xl shadow-lg transition active:scale-95">跑分析</button>
                </div>
            </div>
        </div>

        <div class="bg-slate-800 rounded-[3.5rem] overflow-hidden border border-slate-700 shadow-2xl">
            <table class="w-full text-left" id="mainTable">
                <thead class="bg-slate-700 text-slate-300 font-black uppercase tracking-widest">
                    <tr>
                        <th class="p-8">標的資訊</th>
                        <th>異動狀態</th>
                        <th class="text-right">A日股價</th>
                        <th class="text-right">A日股數</th>
                        <th class="text-right text-slate-400">A日市值</th>
                        <th class="text-right text-blue-300">B日股價</th>
                        <th class="text-right">B日股數</th>
                        <th class="text-right text-white">B日市值</th>
                        <th class="text-right bg-slate-600/40 text-yellow-400 text-3xl">加減碼金額</th>
                    </tr>
                </thead>
                <tbody id="resTable" class="divide-y divide-slate-700/50"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function runAnalysis() {
            const etf = document.getElementById('etfId').value, dA = document.getElementById('dateA').value, dB = document.getElementById('dateB').value;
            try {
                // 路徑結構：data/ETF_ID/YYYY-MM-DD.json
                const [rA, rB] = await Promise.all([fetch(`data/${etf}/${dA}.json`), fetch(`data/${etf}/${dB}.json`)]);
                if(!rA.ok || !rB.ok) return alert(`⚠️ 警告：${etf} 在指定日期的資料夾下找不到檔案。請確認機器人已跑完任務。`);
                
                const jsonA = await rA.json(), jsonB = await rB.json();
                const mapA = Object.fromEntries(jsonA.holdings.map(s => [s.id, s]));
                const mapB = Object.fromEntries(jsonB.holdings.map(s => [s.id, s]));
                const pA_pool = jsonA.market_prices, pB_pool = jsonB.market_prices;
                
                const combined = Array.from(new Set([...Object.keys(mapA), ...Object.keys(mapB)])).map(id => {
                    const sA = mapA[id] || { share: 0, name: mapB[id]?.name };
                    const sB = mapB[id] || { share: 0, name: mapA[id]?.name };
                    
                    // 價格對齊
                    const pA = Number(pA_pool[id]) || 0;
                    const pB = Number(pB_pool[id]) || 0;
                    
                    const valA = sA.share * pA, valB = sB.share * pB, impact = valB - valA;
                    
                    let status = "持平", color = "text-slate-500 border-slate-700";
                    if(sA.share === 0) { status = "新進"; color = "text-yellow-400 border-yellow-900"; }
                    else if(sB.share === 0) { status = "出清"; color = "text-red-500 border-red-900 bg-red-950/20"; }
                    else if(sB.share > sA.share) { status = "加碼"; color = "text-red-400 border-red-800"; }
                    else if(sB.share < sA.share) { status = "減碼"; color = "text-emerald-400 border-emerald-800"; }
                    
                    return { id, name: sB.name || sA.name, status, color, pA, shareA: sA.share, valA, pB, shareB: sB.share, valB, impact };
                });

                combined.sort((a, b) => Math.abs(b.impact) - Math.abs(a.impact));
                
                document.getElementById('resTable').innerHTML = combined.map(row => `
                    <tr class="hover:bg-slate-700/30 transition-all">
                        <td class="p-8"><b>${row.name}</b><br><span class="text-sm font-mono text-slate-500">${row.id}</span></td>
                        <td><span class="px-5 py-2 border rounded-full font-black text-sm ${row.color}">${row.status}</span></td>
                        <td class="text-right font-num text-slate-500">${row.pA || '-'}</td>
                        <td class="text-right font-num text-slate-400">${row.shareA.toLocaleString()}</td>
                        <td class="text-right font-num text-slate-300 font-bold">${Math.round(row.valA).toLocaleString()}</td>
                        <td class="text-right font-num text-blue-300 font-black">${row.pB || '-'}</td>
                        <td class="text-right font-num text-slate-100 font-bold">${row.shareB.toLocaleString()}</td>
                        <td class="text-right font-num text-white font-black">${Math.round(row.valB).toLocaleString()}</td>
                        <td class="text-right font-num text-3xl ${row.impact > 0 ? 'text-red-400' : (row.impact < 0 ? 'text-emerald-400' : 'text-slate-500')}">
                            ${row.impact > 0 ? '+' : ''}${Math.round(row.impact).toLocaleString()}</td>
                    </tr>`).join('');
            } catch (e) { alert("分析失敗，請檢查資料結構。"); }
        }
    </script>
</body>
</html>
