<style>
    /* 全域字體強化 */
    .date-input { background: #1e293b; color: white; border: 3px solid #3b82f6; padding: 14px; border-radius: 12px; cursor: pointer; font-size: 1.5rem; font-weight: 900; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); scale: 1.6; cursor: pointer; }
    
    /* 表頭字體放大 */
    th { white-space: nowrap; font-size: 1.2rem; padding: 1.8rem 1rem !important; cursor: pointer; transition: 0.2s; position: relative; }
    th:hover { background: #334155; color: #60a5fa; }
    .sort-icon::after { content: '⇅'; opacity: 0.2; margin-left: 8px; }
    
    /* 統一數據欄位字體：全數放大至 1.5rem */
    tbody tr td { font-size: 1.5rem; padding: 2.2rem 1rem !important; vertical-align: middle; }
    .font-num { font-family: ui-monospace, SFMono-Regular, monospace; font-weight: 800; }
    
    /* 狀態標籤放大 */
    .status-tag { px-6; py-2; border: 2px solid; border-radius: 9999px; font-weight: 900; font-size: 1.1rem; }
    
    .config-input { background: #0f172a; border: 1px solid #334155; padding: 10px; border-radius: 8px; color: #94a3b8; outline: none; font-size: 1rem; }
    .col-toggle-label { font-size: 1.2rem; font-weight: 700; display: flex; items-center; gap: 8px; cursor: pointer; }
    .col-toggle { scale: 1.5; accent-color: #3b82f6; }
</style>

<script>
// ... 前方代碼不變 ...

function renderTable() {
    const activeCols = ['name'];
    document.querySelectorAll('.view-cfg:checked').forEach(el => activeCols.push(el.dataset.col));

    document.getElementById('tableHeader').innerHTML = activeCols.map(col => `
        <th onclick="handleSort('${col}')" class="${colDef[col].class} ${sortState.key === col ? (sortState.asc ? 'sort-asc' : 'sort-desc') : ''}">
            ${colDef[col].label}
        </th>
    `).join('');

    currentData.sort((a, b) => {
        let vA = a[sortState.key], vB = b[sortState.key];
        if (typeof vA === 'string') return sortState.asc ? vA.localeCompare(vB) : vB.localeCompare(vA);
        return sortState.asc ? vA - vB : vB - vA;
    });

    document.getElementById('resTable').innerHTML = currentData.map(row => {
        let html = `<tr class="hover:bg-slate-700/30 transition-all border-b border-slate-700/50">`;
        activeCols.forEach(col => {
            if (col === 'name') {
                html += `<td class="p-8"><b class="text-2xl">${row.name}</b><br><span class="text-lg font-mono text-slate-500">${row.id}</span></td>`;
            } else if (col === 'status_rank') {
                html += `<td><span class="px-6 py-2 border-2 border-current rounded-full font-black text-lg ${row.color}">${row.status}</span></td>`;
            } else if (col === 'impact' || col === 'marketChange') {
                const val = row[col];
                // 加減碼金額保持特大 4xl，市值變動放大至 2xl
                const fontSize = col === 'impact' ? 'text-5xl' : 'text-3xl';
                html += `<td class="text-right font-num ${fontSize} ${val > 0 ? 'text-red-400' : (val < 0 ? 'text-emerald-400' : 'text-slate-500')}">
                         ${val > 0 ? '+' : ''}${Math.round(val).toLocaleString()}</td>`;
            } else if (['valA', 'valB', 'shareA', 'shareB'].includes(col)) {
                html += `<td class="text-right font-num font-bold text-slate-100">${Math.round(row[col]).toLocaleString()}</td>`;
            } else {
                html += `<td class="text-right font-num text-slate-300">${row[col] || '-'}</td>`;
            }
        });
        return html + `</tr>`;
    }).join('');
}
</script>
