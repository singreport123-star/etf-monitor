<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>ETF 市值監測 v21.0 - 手動補貨版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .date-input { background: #1e293b; color: white; border: 3px solid #3b82f6; padding: 14px; border-radius: 12px; cursor: pointer; font-size: 1.3rem; font-weight: 900; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); scale: 1.6; cursor: pointer; }
        th { white-space: nowrap; font-size: 0.95rem; padding: 1.8rem 1rem !important; cursor: pointer; transition: 0.2s; position: relative; }
        th:hover { background: #334155; color: #60a5fa; }
        .sort-icon::after { content: '⇅'; opacity: 0.2; margin-left: 8px; }
        .sort-asc::after { content: '↑'; opacity: 1; color: #60a5fa; }
        .sort-desc::after { content: '↓'; opacity: 1; color: #60a5fa; }
        tbody tr td { font-size: 1.35rem; padding: 2.2rem 1rem !important; }
        .font-num { font-family: ui-monospace, monospace; font-weight: 800; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 p-8">
    <div class="max-w-[1900px] mx-auto">
        <div class="flex justify-between items-end mb-12">
            <h1 class="text-6xl font-black text-blue-400 tracking-tighter italic">PORTFOLIO ANALYZER</h1>
            <button onclick="feedData(15)" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-3 rounded-2xl font-bold text-lg shadow-lg transition active:scale-95 flex items-center gap-2">
                ⚡ 一鍵補抓最近 15 天數據
            </button>
        </div>

        <div class="bg-slate-800 p-12 rounded-[3rem] mb-12 border border-slate-700 shadow-2xl">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-10 items-end">
                <div class="md:col-span-3">
                    <label class="block text-sm text-slate-500 mb-4 font-bold uppercase tracking-widest">Target ETF</label>
                    <select id="etfId" class="bg-slate-900 p-5 rounded-2xl border-2 border-slate-700 w-full font-black text-2xl outline-none focus:border-blue-500">
                        <option value="00981A">00981A (統一)</option>
                        <option value="00982A">00982A (群益)</option>
                    </select>
                </div>
                <div class="md:col-span-3"><label class="block text-sm text-blue-400 mb-4 font-bold uppercase">📅 DATE A (舊)</label><input id="dateA" type="date" class="date-input w-full"></div>
                <div class="md:col-span-1 text-center pb-6 text-slate-600 font-black italic text-5xl">VS</div>
                <div class="md:col-span-3"><label class="block text-sm text-blue-400 mb-4 font-bold uppercase">📅 DATE B (新)</label><input id="dateB" type="date" class="date-input w-full"></div>
                <div class="md:col-span-2"><button onclick="runAnalysis()" class="w-full bg-blue-600 hover:bg-blue-500 py-6 rounded-3xl font-black text-3xl shadow-lg transition active:scale-95">跑分析</button></div>
            </div>
        </div>

        <div class="bg-slate-800 rounded-[3.5rem] overflow-hidden border border-slate-700 shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left" id="mainTable">
                    <thead class="bg-slate-700 text-slate-300 font-black uppercase tracking-widest">
                        <tr>
                            <th onclick="handleSort('name')" class="p-8 sort-icon">標的</th>
                            <th onclick="handleSort('status_rank')" class="sort-icon">異動狀態</th>
                            <th onclick="handleSort('pA')" class="text-right sort-icon">A日股價</th>
                            <th onclick="handleSort('shareA')" class="text-right sort-icon">A日股數</th>
                            <th onclick="handleSort('valA')" class="text-right text-slate-400 sort-icon">A日市值</th>
                            <th onclick="handleSort('pB')" class="text-right text-blue-300 sort-icon">B日股價</th>
                            <th onclick="handleSort('shareB')" class="text-right sort-icon">B日股數</th>
                            <th onclick="handleSort('valB')" class="text-right text-white sort-icon">B日市值</th>
                            <th onclick="handleSort('impact')" class="text-right bg-slate-600/40 text-yellow-400 text-3xl sort-icon">加減碼金額</th>
                        </tr>
                    </thead>
                    <tbody id="resTable" class="divide-y divide-slate-700/50"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let currentData = [];
        let sortState = { key: 'impact', asc: false };

        window.onload = () => {
            const now = new Date(), today = now.toISOString().split('T')[0];
            document.getElementById('dateB').value = today;
            document.getElementById('dateA').value = new Date(now.setDate(now.getDate() - 1)).toISOString().split('T')[0];
        };

        // ⚡ 批量餵食功能
        async function feedData(days) {
            const owner = localStorage.getItem('ghOwner'), token = localStorage.getItem('ghToken');
            if(!owner || !token) return alert("請確認已輸入 GitHub 帳號與 Token。");
            if(!confirm(`確定要讓機器人補抓最近 ${days} 天的資料嗎？這大約需要 2 分鐘。`)) return;

            const res = await fetch(`https://api.github.com/repos/${owner}/etf-monitor/actions/workflows/verify.yml/dispatches`, {
                method: 'POST', headers: { 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ ref: 'main', inputs: { days: String(days) } })
            });
            if(res.ok) alert("🚀 補貨指令已送出！請等 2 分鐘讓機器人搬運資料。");
            else alert("補貨失敗，請檢查 Token 權限。");
        }

        async function runAnalysis() {
            const etf = document.getElementById('etfId').value, dA = document.getElementById('dateA').value, dB = document.getElementById('dateB').value;
            try {
                const [rA, rB] = await Promise.all([fetch(`data/${etf}/${dA}.json`), fetch(`data/${etf}/${dB}.json`)]);
                if(!rA.ok || !rB.ok) return alert("資料缺失：檔案尚未產出。若此日期為近期，請點擊上方的『補抓最近 15 天』。");
                
                const jsonA = await rA.json(), jsonB = await rB.json();
                const mapA = Object.fromEntries(jsonA.holdings.map(s => [s.id, s]));
                const mapB = Object.fromEntries(jsonB.holdings.map(s => [s.id, s]));
                const pA_pool = jsonA.market_prices, pB_pool = jsonB.market_prices;
                const statusWeight = { "新進": 5, "加碼": 4, "持平": 3, "減碼": 2, "出清": 1 };

                currentData = Array.from(new Set([...Object.keys(mapA), ...Object.keys(mapB)])).map(id => {
                    const sA = mapA[id] || { share: 0, name: mapB[id]?.name };
                    const sB = mapB[id] || { share: 0, name: mapA[id]?.name };
                    const pA = Number(pA_pool[id]) || 0, pB = Number(pB_pool[id]) || 0;
                    const valA = sA.share * pA, valB = sB.share * pB, impact = valB - valA;
                    
                    let status = "持平", color = "text-slate-500";
                    if(sA.share === 0) { status = "新進"; color = "text-yellow-400"; }
                    else if(sB.share === 0) { status = "出清"; color = "text-red-500"; }
                    else if(sB.share > sA.share) { status = "加碼"; color = "text-red-400"; }
                    else if(sB.share < sA.share) { status = "減碼"; color = "text-emerald-400"; }
                    
                    return { id, name: sB.name || sA.name, status, status_rank: statusWeight[status], color, pA, shareA: sA.share, valA, pB, shareB: sB.share, valB, impact };
                });
                renderTable();
            } catch (e) { alert("分析失敗，請檢查資料結構。"); }
        }

        function handleSort(key) {
            if(sortState.key === key) sortState.asc = !sortState.asc;
            else { sortState.key = key; sortState.asc = false; }
            renderTable();
        }

        function renderTable() {
            currentData.sort((a, b) => {
                let vA = a[sortState.key], vB = b[sortState.key];
                if (typeof vA === 'string') return sortState.asc ? vA.localeCompare(vB) : vB.localeCompare(vA);
                return sortState.asc ? vA - vB : vB - vA;
            });
            const headers = ['name', 'status_rank', 'pA', 'shareA', 'valA', 'pB', 'shareB', 'valB', 'impact'];
            document.querySelectorAll('th').forEach((th, i) => {
                th.classList.remove('sort-asc', 'sort-desc');
                if(headers[i] === sortState.key) th.classList.add(sortState.asc ? 'sort-asc' : 'sort-desc');
            });
            document.getElementById('resTable').innerHTML = currentData.map(row => `
                <tr class="hover:bg-slate-700/30 transition-all">
                    <td class="p-8"><b>${row.name}</b><br><span class="text-sm font-mono text-slate-500">${row.id}</span></td>
                    <td><span class="px-5 py-2 border rounded-full font-black text-sm ${row.color}">${row.status}</span></td>
                    <td class="text-right font-num text-slate-500">${row.pA || '-'}</td>
                    <td class="text-right font-num text-slate-400">${row.shareA.toLocaleString()}</td>
                    <td class="text-right font-num text-slate-300 font-bold">${Math.round(row.valA).toLocaleString()}</td>
                    <td class="text-right font-num text-blue-300 font-black">${row.pB || '-'}</td>
                    <td class="text-right font-num text-slate-100 font-bold">${row.shareB.toLocaleString()}</td>
                    <td class="text-right font-num text-white font-black">${Math.round(row.valB).toLocaleString()}</td>
                    <td class="text-right font-num text-4xl ${row.impact > 0 ? 'text-red-400' : (row.impact < 0 ? 'text-emerald-400' : 'text-slate-500')}">
                        ${row.impact > 0 ? '+' : ''}${Math.round(row.impact).toLocaleString()}</td>
                </tr>`).join('');
        }
    </script>
</body>
</html>
