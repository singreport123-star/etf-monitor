<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETF 加減碼動態監測站</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-blue-400">📊 ETF 加減碼監測站</h1>

        <div class="bg-gray-800 border border-blue-500/30 p-6 rounded-xl mb-8 shadow-2xl">
            <h2 class="text-lg font-bold mb-4 flex items-center">🔧 雲端數據採集錄入</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div class="col-span-1 md:col-span-2">
                    <label class="block text-xs text-gray-400 mb-1">GitHub 帳號 / Token (自動記憶)</label>
                    <div class="flex gap-2">
                        <input id="ghOwner" type="text" placeholder="帳號" class="bg-gray-700 border-gray-600 rounded px-3 py-2 w-1/3 focus:border-blue-500 outline-none">
                        <input id="ghToken" type="password" placeholder="ghp_Token" class="bg-gray-700 border-gray-600 rounded px-3 py-2 flex-1 focus:border-blue-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">採集日期</label>
                    <input id="triggerDate" type="date" class="bg-gray-700 border-gray-600 rounded px-3 py-2 w-full">
                </div>
                <button onclick="triggerAction()" class="bg-blue-600 hover:bg-blue-500 py-2 rounded font-bold transition duration-300">🚀 啟動抓取</button>
            </div>
            <p id="statusTxt" class="mt-3 text-sm text-yellow-500 italic font-medium"></p>
        </div>

        <div class="bg-gray-800 p-6 rounded-xl shadow-2xl mb-8">
            <div class="flex flex-wrap gap-6 items-end">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">選擇 ETF</label>
                    <select id="etfId" class="bg-gray-700 border-gray-600 rounded px-4 py-2">
                        <option value="00981A">00981A (統一台股增長)</option>
                        <option value="00982A">00982A (群益精選強棒)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">日期 A (較舊)</label>
                    <select id="dateA" class="bg-gray-700 border-gray-600 rounded px-4 py-2 w-40"></select>
                </div>
                <div class="text-gray-500 font-bold px-2">VS</div>
                <div>
                    <label class="block text-xs text-gray-400 mb-1">日期 B (較新)</label>
                    <select id="dateB" class="bg-gray-700 border-gray-600 rounded px-4 py-2 w-40"></select>
                </div>
                <button onclick="compareData()" class="bg-green-600 hover:bg-green-500 px-10 py-2 rounded font-bold transition">🔎 開始計算</button>
            </div>
        </div>

        <div class="bg-gray-800 rounded-xl overflow-hidden shadow-2xl border border-gray-700">
            <table class="w-full text-left">
                <thead class="bg-gray-700/50 text-gray-400 text-xs">
                    <tr>
                        <th class="p-4">標的</th>
                        <th class="p-4 text-right">A日股數</th>
                        <th class="p-4 text-right">B日股數</th>
                        <th class="p-4 text-right">異動股數</th>
                        <th class="p-4 text-right">B日股價</th>
                        <th class="p-4 text-right text-blue-400">估計加減碼(NTD)</th>
                    </tr>
                </thead>
                <tbody id="resTable" class="divide-y divide-gray-700">
                    <tr><td colspan="6" class="p-10 text-center text-gray-500">暫無比對數據</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 頁面初始化
        window.onload = () => {
            document.getElementById('ghOwner').value = localStorage.getItem('ghOwner') || '';
            document.getElementById('ghToken').value = localStorage.getItem('ghToken') || '';
            loadDateList();
        };

        async function loadDateList() {
            try {
                const res = await fetch('list.json?t=' + Date.now());
                const dates = await res.json();
                const selA = document.getElementById('dateA');
                const selB = document.getElementById('dateB');
                selA.innerHTML = ''; selB.innerHTML = '';
                dates.forEach(d => {
                    selA.add(new Option(d, d));
                    selB.add(new Option(d, d));
                });
                if(dates.length > 1) selA.selectedIndex = 1;
            } catch (e) { console.error("尚未有歷史數據檔案"); }
        }

        async function triggerAction() {
            const owner = document.getElementById('ghOwner').value;
            const token = document.getElementById('ghToken').value;
            const date = document.getElementById('triggerDate').value;
            const txt = document.getElementById('statusTxt');

            if(!owner || !token || !date) return alert("資訊未填齊");
            localStorage.setItem('ghOwner', owner);
            localStorage.setItem('ghToken', token);

            txt.innerText = "⏳ 雲端啟動中，請勿重複點擊...";
            const res = await fetch(`https://api.github.com/repos/${owner}/etf-monitor/actions/workflows/verify.yml/dispatches`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' },
                body: JSON.stringify({ ref: 'main', inputs: { target_date: date } })
            });

            txt.innerText = res.ok ? "✅ 啟動成功！請等待 2-3 分鐘數據入庫後重新整理。" : "❌ 啟動失敗，請檢查 Token 或帳號。";
        }

        async function compareData() {
            const etf = document.getElementById('etfId').value;
            const dA = document.getElementById('dateA').value;
            const dB = document.getElementById('dateB').value;
            const tbody = document.getElementById('resTable');

            const [dataA, dataB] = await Promise.all([
                fetch(`data/${dA}.json`).then(r => r.json()),
                fetch(`data/${dB}.json`).then(r => r.json())
            ]);

            const mapA = Object.fromEntries(dataA.etfs[etf].map(s => [s.id, s]));
            const mapB = Object.fromEntries(dataB.etfs[etf].map(s => [s.id, s]));
            const pricesB = dataB.market_prices || {};
            const allIds = new Set([...Object.keys(mapA), ...Object.keys(mapB)]);

            let html = '';
            Array.from(allIds).sort().forEach(id => {
                const sA = mapA[id] || { share: 0, name: mapB[id]?.name };
                const sB = mapB[id] || { share: 0, name: mapA[id]?.name };
                const diff = sB.share - sA.share;
                const price = pricesB[id] || 0;
                const impact = diff * price;

                if(diff !== 0) {
                    html += `<tr class="hover:bg-gray-700/30 transition">
                        <td class="p-4"><span class="text-xs text-gray-500">${id}</span><br>${sB.name || sA.name}</td>
                        <td class="p-4 text-right">${sA.share.toLocaleString()}</td>
                        <td class="p-4 text-right">${sB.share.toLocaleString()}</td>
                        <td class="p-4 text-right font-bold ${diff > 0 ? 'text-red-400' : 'text-green-400'}">${diff > 0 ? '+' : ''}${diff.toLocaleString()}</td>
                        <td class="p-4 text-right text-gray-400">${price}</td>
                        <td class="p-4 text-right font-mono font-bold ${impact > 0 ? 'text-red-400' : 'text-green-400'}">${Math.round(impact).toLocaleString()}</td>
                    </tr>`;
                }
            });
            tbody.innerHTML = html || '<tr><td colspan="6" class="p-10 text-center text-gray-500">該日期區間無持股異動</td></tr>';
        }
    </script>
</body>
</html>
