<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>ETF 市值監測站 v11.0 - 專業數據管理版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="date"] { background: #1e293b; color: white; border: 2px solid #334155; padding: 10px; border-radius: 12px; cursor: pointer; width: 100%; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); scale: 1.2; cursor: pointer; }
        th { cursor: pointer; position: relative; user-select: none; }
        .sort-icon::after { content: '⇅'; opacity: 0.2; margin-left: 4px; }
        .sort-asc::after { content: '↑'; opacity: 1; color: #60a5fa; }
        .sort-desc::after { content: '↓'; opacity: 1; color: #60a5fa; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl font-black mb-8 text-blue-400 tracking-tighter">📊 ETF 數據管理中心</h1>

        <div class="bg-slate-800 p-6 rounded-2xl mb-8 border border-slate-700 shadow-xl flex flex-wrap gap-6 items-center">
            <div class="flex-1 flex gap-2">
                <input id="ghOwner" type="text" placeholder="GitHub 帳號" class="bg-slate-900 p-2 border border-slate-700 rounded w-1/3 outline-none focus:border-blue-500">
                <input id="ghToken" type="password" placeholder="Token (需 repo 權限)" class="bg-slate-900 p-2 border border-slate-700 rounded flex-1 outline-none focus:border-blue-500">
            </div>
            <div class="flex gap-4 items-center">
                <button onclick="clearLocal()" class="text-xs text-red-400 border border-red-900 px-3 py-2 rounded-lg hover:bg-red-900/20 transition">登出 / 清空設定</button>
                <div id="statusBadge" class="px-3 py-1 rounded-full bg-slate-700 text-[10px] font-bold uppercase">Ready</div>
            </div>
        </div>

        <div class="bg-slate-800 p-8 rounded-2xl mb-8 border border-slate-700 shadow-2xl">
            <div class="grid grid-cols-1 md:grid-cols-5 gap-8 items-end">
                <div>
                    <label class="block text-[10px] text-slate-500 mb-2 font-bold uppercase">選擇標的</label>
                    <select id="etfId" class="bg-slate-900 p-3 rounded-xl border border-slate-700 w-full font-bold outline-none">
                        <option value="00981A">00981A (統一)</option>
                        <option value="00982A">00982A (群益)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] text-blue-400 mb-2 font-bold uppercase tracking-widest">📅 起始 A (舊)</label>
                    <input id="dateA" type="date">
                    <button onclick="deleteFile('dateA')" class="mt-2 w-full text-[10px] text-red-500 hover:text-red-400 font-bold flex items-center justify-center gap-1">
                        <span class="border border-red-900 px-2 py-1 rounded">🗑️ 刪除此日並重抓</span>
                    </button>
                </div>
                <div class="text-center pb-12 text-slate-600 font-black italic text-xl">VS</div>
                <div>
                    <label class="block text-[10px] text-blue-400 mb-2 font-bold uppercase tracking-widest">📅 結束 B (新)</label>
                    <input id="dateB" type="date">
                    <button onclick="deleteFile('dateB')" class="mt-2 w-full text-[10px] text-red-500 hover:text-red-400 font-bold flex items-center justify-center gap-1">
                        <span class="border border-red-900 px-2 py-1 rounded">🗑️ 刪除此日並重抓</span>
                    </button>
                </div>
                <button onclick="runAnalysis()" class="bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-black shadow-lg transition active:scale-95 text-sm">跑分析報表</button>
            </div>
        </div>

        <div class="bg-slate-800 rounded-3xl overflow-hidden border border-slate-700 shadow-2xl">
            <table class="w-full text-left" id="mainTable">
                <thead class="bg-slate-700 text-slate-400 text-[10px] font-bold uppercase tracking-widest">
                    <tr>
                        <th class="p-5 sort-icon" onclick="handleSort('name')">標的名</th>
                        <th class="p-5 sort-icon" onclick="handleSort('status')">異動狀態</th>
                        <th class="p-5 text-right sort-icon" onclick="handleSort('valA')">A日市值</th>
                        <th class="p-5 text-right sort-icon" onclick="handleSort('valB')">B日市值</th>
                        <th class="p-5 text-right bg-slate-600/30 sort-icon" onclick="handleSort('impact')">市值變動 (NTD)</th>
                        <th class="p-5 text-right sort-icon" onclick="handleSort('priceB')">B日收盤價</th>
                    </tr>
                </thead>
                <tbody id="resTable" class="text-sm divide-y divide-slate-700/50"></tbody>
            </table>
        </div>
    </div>

    <script>
        let currentData = [];
        let sortState = { key: 'impact', asc: false };

        window.onload = () => {
            document.getElementById('ghOwner').value = localStorage.getItem('ghOwner') || '';
            document.getElementById('ghToken').value = localStorage.getItem('ghToken') || '';
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('dateB').value = today;
            fetch('list.json?t='+Date.now()).then(r => r.json()).then(d => { if(d.length > 1) document.getElementById('dateA').value = d[1]; });
        };

        function clearLocal() { if(confirm("確定登出並清除所有本地設定？")) { localStorage.clear(); location.reload(); } }

        async function deleteFile(inputId) {
            const date = document.getElementById(inputId).value;
            const owner = document.getElementById('ghOwner').value, token = document.getElementById('ghToken').value;
            if(!date || !owner || !token) return alert("請選取日期並確認 Token 已經填寫。");
            if(!confirm(`⚠️ 危險動作！\n確定要從 GitHub 刪除 ${date} 的原始檔案嗎？\n刪除後系統會自動啟動重抓任務，以補齊缺失的股價。`)) return;

            const badge = document.getElementById('statusBadge');
            badge.innerText = "Processing..."; badge.className = "px-3 py-1 rounded-full bg-yellow-600 text-[10px] font-bold uppercase animate-pulse";

            try {
                // 1. 抓取檔案資訊以獲取 SHA
                const fileRes = await fetch(`https://api.github.com/repos/${owner}/etf-monitor/contents/data/${date}.json`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const fileData = await fileRes.json();
                
                if(!fileData.sha) {
                    alert("GitHub 上找不到該日期的檔案。");
                } else {
                    // 2. 執行刪除
                    const delRes = await fetch(`https://api.github.com/repos/${owner}/etf-monitor/contents/data/${date}.json`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' },
                        body: JSON.stringify({ message: `🗑️ System delete: ${date} for re-sync`, sha: fileData.sha })
                    });
                    
                    if(delRes.ok) {
                        badge.innerText = "Success"; badge.className = "px-3 py-1 rounded-full bg-emerald-600 text-[10px] font-bold uppercase";
                        alert(`${date} 資料已刪除！機器人將在 3 秒後自動啟動重抓。`);
                        await triggerAction(date);
                        location.reload();
                    } else { throw new Error(); }
                }
            } catch (e) {
                badge.innerText = "Failed"; badge.className = "px-3 py-1 rounded-full bg-red-600 text-[10px] font-bold uppercase";
                alert("刪除失敗！請檢查您的 Token 是否具備 [repo] 權限。");
            }
        }

        async function triggerAction(date) {
            const owner = document.getElementById('ghOwner').value, token = document.getElementById('ghToken').value;
            localStorage.setItem('ghOwner', owner); localStorage.setItem('ghToken', token);
            await fetch(`https://api.github.com/repos/${owner}/etf-monitor/actions/workflows/verify.yml/dispatches`, {
                method: 'POST', headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' },
                body: JSON.stringify({ ref: 'main', inputs: { target_date: date } })
            });
        }

        async function runAnalysis() {
            const etf = document.getElementById('etfId').value, dA = document.getElementById('dateA').value, dB = document.getElementById('dateB').value;
            const rA = await fetch(`data/${dA}.json`), rB = await fetch(`data/${dB}.json`);
            
            if(!rA.ok || !rB.ok) {
                if(!rA.ok) await triggerAction(dA);
                if(!rB.ok) await triggerAction(dB);
                return alert("正在自動補抓缺失的數據，請等 2 分鐘。");
            }

            const jsonA = await rA.json(), jsonB = await rB.json();
            const mapA = Object.fromEntries(jsonA.etfs[etf].map(s => [s.id, s]));
            const mapB = Object.fromEntries(jsonB.etfs[etf].map(s => [s.id, s]));
            const pricesA = jsonA.market_prices || {}, pricesB = jsonB.market_prices || {};
            
            currentData = Array.from(new Set([...Object.keys(mapA), ...Object.keys(mapB)])).map(id => {
                const sA = mapA[id] || { share: 0, name: mapB[id]?.name };
                const sB = mapB[id] || { share: 0, name: mapA[id]?.name };
                const pA = (typeof pricesA[id] === 'number') ? pricesA[id] : 0;
                const pB = (typeof pricesB[id] === 'number') ? pricesB[id] : 0;
                const valA = sA.share * pA, valB = sB.share * pB, impact = valB - valA;
                
                let status = "不變", color = "text-slate-500 border-slate-700";
                if(sA.share === 0 && sB.share > 0) { status = "新進"; color = "text-yellow-400 border-yellow-900"; }
                else if(sB.share === 0 && sA.share > 0) { status = "出清"; color = "text-red-500 border-red-900 bg-red-950/20"; }
                else if(sB.share > sA.share) { status = "加碼"; color = "text-red-400 border-red-800"; }
                else if(sB.share < sA.share) { status = "減碼"; color = "text-emerald-400 border-emerald-800"; }
                
                return { id, name: (sB.name || sA.name || '未知'), status, valA, valB, impact, priceB: (pB || '無價格'), color };
            });
            renderTable();
        }

        function handleSort(key) {
            if(sortState.key === key) sortState.asc = !sortState.asc;
            else { sortState.key = key; sortState.asc = false; }
            renderTable();
        }

        function renderTable() {
            currentData.sort((a, b) => sortState.asc ? (a[sortState.key] > b[sortState.key] ? 1 : -1) : (b[sortState.key] > a[sortState.key] ? 1 : -1));
            const keys = ['name', 'status', 'valA', 'valB', 'impact', 'priceB'];
            document.querySelectorAll('th').forEach((th, i) => {
                th.classList.remove('sort-asc', 'sort-desc');
                if(keys[i] === sortState.key) th.classList.add(sortState.asc ? 'sort-asc' : 'sort-desc');
            });
            document.getElementById('resTable').innerHTML = currentData.map(row => `
                <tr class="hover:bg-slate-700/40">
                    <td class="p-5"><b>${row.name}</b> <br><span class="text-[9px] font-mono text-slate-500">${row.id}</span></td>
                    <td class="p-5"><span class="text-[10px] px-2 py-0.5 border rounded-full font-black ${row.color}">${row.status}</span></td>
                    <td class="p-5 text-right text-slate-400">${Math.round(row.valA).toLocaleString()}</td>
                    <td class="p-5 text-right text-slate-400">${Math.round(row.valB).toLocaleString()}</td>
                    <td class="p-5 text-right font-black ${row.impact > 0 ? 'text-red-400' : (row.impact < 0 ? 'text-emerald-400' : 'text-slate-500')}">
                        ${row.impact > 0 ? '+' : ''}${Math.round(row.impact).toLocaleString()}</td>
                    <td class="p-5 text-right font-bold text-slate-300">${row.priceB}</td>
                </tr>`).join('');
        }
    </script>
</body>
</html>
